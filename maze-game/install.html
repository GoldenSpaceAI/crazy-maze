<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Install Maze Escape - One Click</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 30px;
            border: 2px solid #FFD700;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }
        h1 {
            color: #FFD700;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .game-icon {
            font-size: 120px;
            margin: 30px 0;
        }
        .install-btn {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            font-size: 2rem;
            font-weight: bold;
            padding: 20px 50px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            margin: 20px 0;
            width: 100%;
            max-width: 300px;
            transition: transform 0.2s;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
        }
        .install-btn:active {
            transform: scale(0.95);
        }
        .status {
            margin-top: 20px;
            color: #FFD700;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 MAZE ESCAPE 🏆</h1>
        <div class="game-icon">🎮</div>
        <button class="install-btn" id="installBtn">
            📲 INSTALL GAME 📲
        </button>
        <div class="status" id="status"></div>
    </div>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        const statusDiv = document.getElementById('status');

        // Wait for app to be ready to install
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            statusDiv.innerHTML = '✅ Ready to install! Click the button above.';
        });

        // ONE CLICK INSTALL
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // Show install prompt
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                
                if (outcome === 'accepted') {
                    statusDiv.innerHTML = '✅ Installing... Check your home screen!';
                } else {
                    statusDiv.innerHTML = '❌ Installation cancelled';
                }
                deferredPrompt = null;
            } else {
                statusDiv.innerHTML = '📱 Tap the 3 dots menu → "Install App"';
            }
        });

        // Check if already installed
        if (window.matchMedia('(display-mode: standalone)').matches) {
            statusDiv.innerHTML = '✅ Game is already installed!';
            installBtn.disabled = true;
            installBtn.style.opacity = '0.5';
        }
    </script>
</body>
</html>
